# Playable Lessons — self-hosted Docker deployment
#
# Quick start:
#   1. Create a .env file (same directory as this file) with your settings.
#   2. docker compose up -d
#   3. Open http://localhost:3000
#
# .env example:
#   ANTHROPIC_API_KEY=sk-ant-...
#   MODEL=claude-sonnet-4-20250514
#   ACCESS_CODE=staff-2024

services:
  playable-lessons:
    image: ghcr.io/michael-borck/playable-lessons:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
